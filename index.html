<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>健身打卡（在线版）</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:#0b1020;color:#e5e7eb}
    .wrap{max-width:920px;margin:0 auto;padding:28px 16px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px}
    h1{margin:0 0 10px;font-size:22px}
    p{margin:0 0 12px;line-height:1.6;color:#cbd5e1}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
    a.btn{display:block;text-decoration:none;color:#0b1020;background:#a5b4fc;border-radius:14px;padding:14px 14px;font-weight:800}
    a.btn.secondary{background:#67e8f9}
    .note{margin-top:12px;font-size:13px;color:#94a3b8}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>健身逐组打卡（在线版）</h1>
      <p>点下面进入：计时/自动保存/倒计时提示音都能在 Telegram 内置浏览器正常工作；现在也支持接 Supabase 做服务器端同步。</p>
      <div class="grid">
        <a class="btn" id="gymLink" href="./workout.html">进入：逐组打卡版（含建议重量）</a>
        <a class="btn secondary" id="homeLink" href="./workout_home.html">进入：纯家用器械版</a>
      </div>
      <div class="note">
        提醒：默认仍会保存在你手机浏览器本地（localStorage）；如果你在设置里填好 Supabase 配置，就会自动同步到服务器端。
      </div>
    </div>
  </div>
<script>
(function(){
  try{
    const params = new URLSearchParams(location.search);
    const sync = (params.get('sync') || params.get('syncCode') || '').trim();
    if(!sync) return;
    ['gymLink','homeLink'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el) return;
      const url = new URL(el.getAttribute('href'), location.href);
      url.searchParams.set('sync', sync);
      el.setAttribute('href', url.pathname + '?' + url.searchParams.toString());
    });
  }catch(e){}
})();
</script></body>
</html>
